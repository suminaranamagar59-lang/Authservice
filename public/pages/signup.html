<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SecureAuth — Sign Up</title>
  <link rel="stylesheet" href="/css/style.css" />
  <!-- Google reCAPTCHA v2 (checkbox) -->
  <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">

      <!-- Brand Header -->
      <div class="brand">
        <div class="brand-logo">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/>
          </svg>
        </div>
        <h1>Create Account</h1>
        <p>Join SecureAuth — it's free</p>
      </div>

      <!-- Alert Box -->
      <div class="alert" id="alertBox" role="alert"></div>

      <!-- Signup Form -->
      <form id="signupForm" novalidate>

        <!-- Full Name -->
        <div class="form-group">
          <label for="name">Full Name</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>
            </svg>
            <input type="text" id="name" name="name" class="form-control"
              placeholder="Your full name" autocomplete="name" />
          </div>
          <div class="field-error" id="nameError"></div>
        </div>

        <!-- Email -->
        <div class="form-group">
          <label for="email">Email Address</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>
            </svg>
            <input type="email" id="email" name="email" class="form-control"
              placeholder="you@example.com" autocomplete="email" />
          </div>
          <div class="field-error" id="emailError"></div>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/>
            </svg>
            <input type="password" id="password" name="password" class="form-control"
              placeholder="Min 6 characters" autocomplete="new-password" />
            <button type="button" class="toggle-password" onclick="togglePassword('password', this)" title="Show/hide password">
              <svg id="eyeIcon-password" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <!-- Password strength indicator -->
          <div class="password-strength" id="strengthIndicator">
            <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
            <div class="strength-text" id="strengthText"></div>
          </div>
          <div class="field-error" id="passwordError"></div>
        </div>

        <!-- Confirm Password -->
        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/>
            </svg>
            <input type="password" id="confirmPassword" class="form-control"
              placeholder="Repeat password" autocomplete="new-password" />
          </div>
          <div class="field-error" id="confirmError"></div>
        </div>

        <!-- Google reCAPTCHA v2 Checkbox -->
        <div class="recaptcha-wrapper">
          <div class="g-recaptcha" data-sitekey="6Leq75ssAAAAANzW7_Z9nhT9Z3kWk-3CPJ8giv4w"></div>
        </div>
        <div class="field-error" id="captchaError"></div>

        <!-- Submit Button -->
        <button type="submit" class="btn btn-primary" id="submitBtn">
          <div class="spinner"></div>
          <span class="btn-text">Create Account</span>
        </button>
      </form>

      <div class="form-footer">
        Already have an account? <a href="/login">Login here</a>
      </div>

    </div>
  </div>

  <script src="/js/utils.js"></script>
  <script>
    const form = document.getElementById("signupForm");
    const alertBox = document.getElementById("alertBox");
    const submitBtn = document.getElementById("submitBtn");

    // Password strength indicator
    document.getElementById("password").addEventListener("input", function () {
      const strength = getPasswordStrength(this.value);
      const indicator = document.getElementById("strengthIndicator");
      const fill = document.getElementById("strengthFill");
      const text = document.getElementById("strengthText");

      if (this.value.length > 0) {
        indicator.classList.add("visible");
        fill.style.width = strength.width;
        fill.style.background = strength.color;
        text.textContent = `Strength: ${strength.label}`;
        text.style.color = strength.color;
      } else {
        indicator.classList.remove("visible");
      }
    });

    // Toggle password visibility
    function togglePassword(fieldId, btn) {
      const input = document.getElementById(fieldId);
      input.type = input.type === "password" ? "text" : "password";
    }

    // Real-time confirm password validation
    document.getElementById("confirmPassword").addEventListener("input", function () {
      const password = document.getElementById("password").value;
      const confirmError = document.getElementById("confirmError");
      const confirmInput = document.getElementById("confirmPassword");
      if (this.value && this.value !== password) {
        showFieldError(confirmInput, confirmError, "Passwords do not match.");
      } else {
        clearFieldError(confirmInput, confirmError);
      }
    });

    // Form submission
    form.addEventListener("submit", async function (e) {
      e.preventDefault();
      hideAlert(alertBox);

      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const confirmPassword = document.getElementById("confirmPassword").value;

      // Clear all previous errors
      ["name","email","password","confirm","captcha"].forEach(f => {
        const input = document.getElementById(f === "confirm" ? "confirmPassword" : f);
        const err = document.getElementById(f + (f === "confirm" ? "Error" : "Error"));
        if (input && err) clearFieldError(input, err);
      });

      let hasError = false;

      // Validate name
      if (!name || name.length < 2) {
        showFieldError(document.getElementById("name"), document.getElementById("nameError"), "Please enter your full name.");
        hasError = true;
      }

      // Validate email
      if (!isValidEmail(email)) {
        showFieldError(document.getElementById("email"), document.getElementById("emailError"), "Please enter a valid email address.");
        hasError = true;
      }

      // Validate password
      if (password.length < 6) {
        showFieldError(document.getElementById("password"), document.getElementById("passwordError"), "Password must be at least 6 characters.");
        hasError = true;
      }

      // Validate confirm password
      if (password !== confirmPassword) {
        showFieldError(document.getElementById("confirmPassword"), document.getElementById("confirmError"), "Passwords do not match.");
        hasError = true;
      }

      // Get reCAPTCHA token
      const recaptchaToken = grecaptcha.getResponse();
      if (!recaptchaToken) {
        document.getElementById("captchaError").textContent = "Please complete the reCAPTCHA.";
        document.getElementById("captchaError").classList.add("visible");
        hasError = true;
      }

      if (hasError) return;

      setLoading(submitBtn, true);

      try {
        const result = await apiRequest("/signup", "POST", { name, email, password, recaptchaToken });

        if (result.ok) {
          showAlert(alertBox, result.data.message, "success");
          form.reset();
          grecaptcha.reset();
          document.getElementById("strengthIndicator").classList.remove("visible");
        } else {
          showAlert(alertBox, result.data.message || "Signup failed. Please try again.", "error");
          grecaptcha.reset();
        }
      } catch (err) {
        showAlert(alertBox, "Network error. Please check your connection and try again.", "error");
      }

      setLoading(submitBtn, false);
    });
  </script>
</body>
</html>
