<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SecureAuth — Login</title>
  <link rel="stylesheet" href="/css/style.css" />
  <script src="https://www.google.com/recaptcha/api.js" async defer></script>
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">

      <!-- Brand Header -->
      <div class="brand">
        <div class="brand-logo">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/>
          </svg>
        </div>
        <h1>Welcome Back</h1>
        <p>Login to your SecureAuth account</p>
      </div>

      <!-- Alert Box -->
      <div class="alert" id="alertBox" role="alert"></div>

      <!-- Login Form -->
      <form id="loginForm" novalidate>

        <!-- Email -->
        <div class="form-group">
          <label for="email">Email Address</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>
            </svg>
            <input type="email" id="email" class="form-control"
              placeholder="you@example.com" autocomplete="email" />
          </div>
          <div class="field-error" id="emailError"></div>
        </div>

        <!-- Password -->
        <div class="form-group">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:7px;">
            <label for="password" style="margin-bottom:0;">Password</label>
            <a href="/forgot-password" style="font-size:12px; color:#7f8c8d;">Forgot password?</a>
          </div>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/>
            </svg>
            <input type="password" id="password" class="form-control"
              placeholder="Your password" autocomplete="current-password" />
            <button type="button" class="toggle-password" onclick="togglePass()" title="Show/hide password">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <div class="field-error" id="passwordError"></div>
        </div>

        <!-- reCAPTCHA -->
        <div class="recaptcha-wrapper">
          <div class="g-recaptcha" data-sitekey="6LfKYJssAAAAAAHtyluWPspyDdMH6H6m0bSEB99c"></div>
        </div>
        <div class="field-error" id="captchaError"></div>

        <!-- Submit -->
        <button type="submit" class="btn btn-primary" id="submitBtn">
          <div class="spinner"></div>
          <span class="btn-text">Login</span>
        </button>
      </form>

      <div class="form-footer">
        Don't have an account? <a href="/signup">Sign up here</a>
      </div>

    </div>
  </div>

  <script src="/js/utils.js"></script>
  <script>
    // Redirect to dashboard if already logged in
    if (getToken()) redirect("/dashboard");

    function togglePass() {
      const input = document.getElementById("password");
      input.type = input.type === "password" ? "text" : "password";
    }

    document.getElementById("loginForm").addEventListener("submit", async function (e) {
      e.preventDefault();
      const alertBox = document.getElementById("alertBox");
      hideAlert(alertBox);

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const submitBtn = document.getElementById("submitBtn");

      // Clear errors
      clearFieldError(document.getElementById("email"), document.getElementById("emailError"));
      clearFieldError(document.getElementById("password"), document.getElementById("passwordError"));
      document.getElementById("captchaError").classList.remove("visible");

      let hasError = false;

      if (!isValidEmail(email)) {
        showFieldError(document.getElementById("email"), document.getElementById("emailError"), "Please enter a valid email.");
        hasError = true;
      }
      if (!password) {
        showFieldError(document.getElementById("password"), document.getElementById("passwordError"), "Password is required.");
        hasError = true;
      }

      const recaptchaToken = grecaptcha.getResponse();
      if (!recaptchaToken) {
        document.getElementById("captchaError").textContent = "Please complete the reCAPTCHA.";
        document.getElementById("captchaError").classList.add("visible");
        hasError = true;
      }

      if (hasError) return;

      setLoading(submitBtn, true);

      try {
        const result = await apiRequest("/login", "POST", { email, password, recaptchaToken });

        if (result.ok) {
          // Save token and user data
          saveToken(result.data.token);
          localStorage.setItem("userData", JSON.stringify(result.data.user));
          showAlert(alertBox, "Login successful! Redirecting...", "success");
          setTimeout(() => redirect("/dashboard"), 800);
        } else {
          showAlert(alertBox, result.data.message || "Login failed. Please try again.", "error");
          grecaptcha.reset();
        }
      } catch (err) {
        showAlert(alertBox, "Network error. Please check your connection.", "error");
      }

      setLoading(submitBtn, false);
    });
  </script>
</body>
</html>
