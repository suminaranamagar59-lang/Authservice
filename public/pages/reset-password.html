<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SecureAuth — Reset Password</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">

      <div class="brand">
        <div class="brand-logo">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/>
          </svg>
        </div>
        <h1>Reset Password</h1>
        <p>Enter your new password below</p>
      </div>

      <div class="alert" id="alertBox"></div>

      <!-- Invalid/no token state -->
      <div id="invalidToken" style="display:none; text-align:center;">
        <p style="font-size:36px; margin-bottom:12px;">⚠️</p>
        <p style="color:#7f8c8d; font-size:14px;">This reset link is invalid or has expired.</p>
        <a href="/forgot-password" class="btn btn-primary" style="display:inline-flex; text-decoration:none; margin-top:20px;">Request New Link</a>
      </div>

      <form id="resetForm" novalidate>
        <!-- New Password -->
        <div class="form-group">
          <label for="password">New Password</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/>
            </svg>
            <input type="password" id="password" class="form-control"
              placeholder="Min 6 characters" autocomplete="new-password" />
            <button type="button" class="toggle-password" onclick="togglePass('password')" title="Show/hide">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <div class="password-strength" id="strengthIndicator">
            <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
            <div class="strength-text" id="strengthText"></div>
          </div>
          <div class="field-error" id="passwordError"></div>
        </div>

        <!-- Confirm Password -->
        <div class="form-group">
          <label for="confirmPassword">Confirm New Password</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/>
            </svg>
            <input type="password" id="confirmPassword" class="form-control"
              placeholder="Repeat new password" autocomplete="new-password" />
          </div>
          <div class="field-error" id="confirmError"></div>
        </div>

        <button type="submit" class="btn btn-primary" id="submitBtn">
          <div class="spinner"></div>
          <span class="btn-text">Reset Password</span>
        </button>
      </form>

    </div>
  </div>

  <script src="/js/utils.js"></script>
  <script>
    // Get reset token from URL
    const params = new URLSearchParams(window.location.search);
    const resetToken = params.get("token");

    // If no token in URL, show error
    if (!resetToken) {
      document.getElementById("resetForm").style.display = "none";
      document.getElementById("invalidToken").style.display = "block";
    }

    function togglePass(id) {
      const input = document.getElementById(id);
      input.type = input.type === "password" ? "text" : "password";
    }

    // Password strength
    document.getElementById("password").addEventListener("input", function () {
      const s = getPasswordStrength(this.value);
      const ind = document.getElementById("strengthIndicator");
      if (this.value.length > 0) {
        ind.classList.add("visible");
        document.getElementById("strengthFill").style.cssText = `width:${s.width}; background:${s.color}`;
        document.getElementById("strengthText").textContent = `Strength: ${s.label}`;
        document.getElementById("strengthText").style.color = s.color;
      } else {
        ind.classList.remove("visible");
      }
    });

    document.getElementById("resetForm").addEventListener("submit", async function (e) {
      e.preventDefault();
      const alertBox = document.getElementById("alertBox");
      const submitBtn = document.getElementById("submitBtn");
      const password = document.getElementById("password").value;
      const confirmPassword = document.getElementById("confirmPassword").value;
      hideAlert(alertBox);

      let hasError = false;

      if (password.length < 6) {
        showFieldError(document.getElementById("password"), document.getElementById("passwordError"), "Password must be at least 6 characters.");
        hasError = true;
      } else {
        clearFieldError(document.getElementById("password"), document.getElementById("passwordError"));
      }

      if (password !== confirmPassword) {
        showFieldError(document.getElementById("confirmPassword"), document.getElementById("confirmError"), "Passwords do not match.");
        hasError = true;
      } else {
        clearFieldError(document.getElementById("confirmPassword"), document.getElementById("confirmError"));
      }

      if (hasError) return;

      setLoading(submitBtn, true);

      try {
        const result = await apiRequest("/reset-password", "POST", { token: resetToken, password });

        if (result.ok) {
          showAlert(alertBox, result.data.message + " Redirecting to login...", "success");
          document.getElementById("resetForm").style.pointerEvents = "none";
          setTimeout(() => redirect("/login"), 2000);
        } else {
          showAlert(alertBox, result.data.message || "Reset failed. Please try again.", "error");
        }
      } catch (err) {
        showAlert(alertBox, "Network error. Please try again.", "error");
      }

      setLoading(submitBtn, false);
    });
  </script>
</body>
</html>
