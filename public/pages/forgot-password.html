<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SecureAuth — Forgot Password</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card">

      <div class="brand">
        <div class="brand-logo">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/>
          </svg>
        </div>
        <h1>Forgot Password?</h1>
        <p>Enter your email and we'll send a reset link</p>
      </div>

      <div class="alert" id="alertBox"></div>

      <form id="forgotForm" novalidate>
        <div class="form-group">
          <label for="email">Email Address</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>
            </svg>
            <input type="email" id="email" class="form-control"
              placeholder="you@example.com" autocomplete="email" />
          </div>
          <div class="field-error" id="emailError"></div>
        </div>

        <button type="submit" class="btn btn-primary" id="submitBtn">
          <div class="spinner"></div>
          <span class="btn-text">Send Reset Link</span>
        </button>
      </form>

      <div class="form-footer">
        <a href="/login">← Back to Login</a>
      </div>

    </div>
  </div>

  <script src="/js/utils.js"></script>
  <script>
    document.getElementById("forgotForm").addEventListener("submit", async function (e) {
      e.preventDefault();
      const alertBox = document.getElementById("alertBox");
      const submitBtn = document.getElementById("submitBtn");
      const email = document.getElementById("email").value.trim();
      hideAlert(alertBox);

      if (!isValidEmail(email)) {
        showFieldError(document.getElementById("email"), document.getElementById("emailError"), "Please enter a valid email address.");
        return;
      }
      clearFieldError(document.getElementById("email"), document.getElementById("emailError"));

      setLoading(submitBtn, true);

      try {
        const result = await apiRequest("/forgot-password", "POST", { email });
        // Always show success message (even if email not found — prevents enumeration)
        showAlert(alertBox, result.data.message, "success");
        document.getElementById("forgotForm").reset();
      } catch (err) {
        showAlert(alertBox, "Network error. Please try again.", "error");
      }

      setLoading(submitBtn, false);
    });
  </script>
</body>
</html>
